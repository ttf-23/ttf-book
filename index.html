<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>紀錄 / tantingfang 的書庫</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #215865; color: #215865; font-weight: bold; }
        .active-tab-secret { border-bottom: 3px solid #f43f5e; color: #f43f5e; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal.show { display: flex; }
        #tanBtn { cursor: pointer; user-select: none; opacity: 0.15; transition: opacity 0.3s; }
        #tanBtn:hover { opacity: 0.8; }
        input, textarea, select { outline: none; border-radius: 8px; padding: 10px; border: 1px solid #e2e8f0; width: 100%; font-size: 14px; background: white; color: #1a202c; }
        .dark input, .dark textarea, .dark select { background: #2d3748; color: #e2e8f0; border-color: #4a5568; }
    </style>
</head>
<body id="bodyBg" class="bg-slate-50 min-h-screen font-sans transition-colors duration-300">

    <nav id="navBg" class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 id="appTitle" class="text-xl font-bold text-slate-900">📖 書庫紀錄</h1>
                <span id="tanBtn" onclick="triggerSecretMode()" class="text-[11px] text-slate-400 font-mono italic px-2 py-1">tan</span>
                <button onclick="fetchAllData()" id="syncBtn" class="ml-2 text-sm text-emerald-700 font-bold border border-emerald-200 px-3 py-1.5 rounded-lg bg-emerald-50">🔄 同步雲端</button>
            </div>
            <div class="flex items-center gap-3">
                <span id="modeBadge" class="hidden text-xs bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded-full">🔒 隱密模式中</span>
                <button onclick="showModal('categoryModal')" class="text-xs border border-slate-300 px-3 py-1.5 rounded-lg text-slate-700 bg-white">分類</button>
            </div>
        </div>
    </nav>

    <div id="tabContainer" class="max-w-4xl mx-auto p-4 flex gap-6 border-b overflow-x-auto bg-white sticky top-[65px] z-40"></div>
    <main id="bookContainer" class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-5 pb-28"></main>

    <button onclick="openAddModal()" id="addBtn" class="fixed bottom-8 right-8 bg-emerald-700 text-white w-16 h-16 rounded-full shadow-2xl text-4xl z-40 flex items-center justify-center transition-transform hover:scale-105 active:scale-95">+</button>

    <div id="categoryModal" class="modal">
        <div class="bg-white rounded-2xl w-full max-w-md p-7 shadow-xl book-modal-content">
            <h3 class="text-xl font-bold mb-5 text-center text-slate-900 modal-text">分類設定 (<span id="catModalMode">正常</span>)</h3>
            <div id="categoryList" class="mb-5 space-y-2.5 max-h-60 overflow-y-auto"></div>
            <div class="bg-slate-100 p-4 rounded-xl space-y-3 book-modal-form">
                <input id="newCatName" type="text" placeholder="新分類名稱">
                <button onclick="addCategory()" class="w-full bg-emerald-700 text-white py-2.5 rounded-lg text-sm font-bold idBtn">新增分類</button>
            </div>
            <button onclick="closeModal('categoryModal')" class="w-full mt-5 text-slate-500 py-2 text-sm">關閉彈窗</button>
            <button onclick="resetAllData()" class="w-full mt-3 text-red-400 text-[11px] font-bold">⚠️ 強制清除手機快取(Reset)</button>
        </div>
    </div>

    <div id="bookModal" class="modal">
        <div class="bg-white rounded-2xl w-full max-w-md p-7 overflow-y-auto max-h-[95vh] shadow-xl book-modal-content">
            <h3 id="bookModalTitle" class="text-xl font-bold mb-6 text-slate-900 modal-text">新增書籍紀錄</h3>
            <input type="hidden" id="bookId">
            <div class="space-y-4 book-modal-form">
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">書名 (必填)</label><input id="bTitle" type="text" placeholder="輸入書名..."></div>
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">作者</label><input id="author" type="text" placeholder="作者名稱..."></div>
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">簡介 (心得)</label><textarea id="desc" placeholder="寫點閱讀心得或簡介..." class="h-28"></textarea></div>
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">網址</label><input id="link" type="text" placeholder="https://..."></div>
                <div class="flex gap-4">
                    <div class="w-1/2"><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">評分</label><input id="rating" type="number" step="0.5" min="0" max="10" value="5"></div>
                    <div class="w-1/2"><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">分類</label><select id="bCat"></select></div>
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-6 mt-2 border-t border-slate-100 modal-footer">
                <button onclick="closeModal('bookModal')" class="px-5 py-2.5 text-slate-500 text-sm">取消</button>
                <button id="saveBtn" onclick="saveBook()" class="bg-emerald-700 text-white px-8 py-2.5 rounded-lg font-bold text-sm idBtn">儲存並同步雲端</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlN3KI7nsl5ZAqxWJFahZu-LkQTC78g85_fa8hU3_I6QhOx2uL-tes_Bu2eEb6Kdko/exec"; 
        const PRIVATE_PASS = "0416";

        let publicCats = JSON.parse(localStorage.getItem('pub_cats_v6')) || [{name:'未讀'},{name:'已讀'}];
        let secretCats = JSON.parse(localStorage.getItem('sec_cats_v6')) || [{name:'隱密區1'},{name:'隱密區2'}];
        let books = JSON.parse(localStorage.getItem('books_v6')) || [];
        
        let isSecretMode = false;
        let activeTab = '';

        function triggerSecretMode() {
            if (!isSecretMode) {
                const password = prompt("🔒 此為隱密空間，請輸入安全密碼：");
                if (password === PRIVATE_PASS) {
                    isSecretMode = true;
                    autoExtractCategories(); // 切換時自動從書籍提取最新分類
                    activeTab = secretCats[0] ? secretCats[0].name : '';
                    enterSecretStyle();
                } else if (password !== null) {
                    alert("❌ 密碼錯誤！存取被拒。");
                }
            } else {
                isSecretMode = false;
                autoExtractCategories(); // 切換時自動從書籍提取最新分類
                activeTab = publicCats[0] ? publicCats[0].name : '';
                exitSecretStyle();
            }
            renderUI();
        }

        // 【核心大腦升級】：直接掃描書籍資料中的分類，強行覆寫本機分類
        function autoExtractCategories() {
            const currentModeBooks = books.filter(b => b.isSecret === isSecretMode);
            if (currentModeBooks.length > 0) {
                // 找出所有在書籍裡出現過的分類名稱
                const uniqueCats = [...new Set(currentModeBooks.map(b => b.category).filter(Boolean))];
                const catObjects = uniqueCats.map(name => ({ name }));
                
                if (isSecretMode) {
                    secretCats = catObjects;
                    localStorage.setItem('sec_cats_v6', JSON.stringify(secretCats));
                } else {
                    publicCats = catObjects;
                    localStorage.setItem('pub_cats_v6', JSON.stringify(publicCats));
                }
            }
            
            // 確保 activeTab 不為空
            const currentCats = isSecretMode ? secretCats : publicCats;
            if (currentCats.length > 0 && (!activeTab || !currentCats.some(c => c.name === activeTab))) {
                activeTab = currentCats[0].name;
            }
        }

        function enterSecretStyle() {
            document.documentElement.classList.add('dark');
            document.getElementById('bodyBg').className = "bg-zinc-950 min-h-screen font-sans transition-colors duration-300 text-zinc-100";
            document.getElementById('navBg').className = "bg-zinc-900 shadow-xl sticky top-0 z-50 border-b border-zinc-800";
            document.getElementById('tab
