<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>紀錄 / tantingfang 的書庫</title>
    <link rel="manifest" href="manifest.json?v=107">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #215865; color: #215865; font-weight: bold; }
        .active-tab-secret { border-bottom: 3px solid #f43f5e; color: #f43f5e; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal.show { display: flex; }
        #tanBtn { cursor: pointer; user-select: none; opacity: 0.15; transition: opacity 0.3s; }
        #tanBtn:hover { opacity: 0.8; }
        input, textarea, select { outline: none; border-radius: 8px; padding: 10px; border: 1px solid #e2e8f0; width: 100%; font-size: 14px; background: white; color: #1a202c; }
        .dark input, .dark textarea, .dark select { background: #2d3748; color: #e2e8f0; border-color: #4a5568; }
    </style>
</head>
<body id="bodyBg" class="bg-slate-50 min-h-screen font-sans transition-colors duration-300">

    <nav id="navBg" class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 id="appTitle" class="text-xl font-bold text-slate-900">📖 書庫紀錄</h1>
                <span id="tanBtn" onclick="triggerSecretMode()" class="text-[11px] text-slate-400 font-mono italic px-2 py-1">tan</span>
                <button onclick="fetchAllData()" id="syncBtn" class="ml-2 text-sm text-emerald-700 font-bold border border-emerald-200 px-3 py-1.5 rounded-lg bg-emerald-50">🔄 同步</button>
                <button onclick="saveSortOrder()" id="saveOrderBtn" class="hidden ml-1 text-sm text-amber-700 font-bold border border-amber-200 px-3 py-1.5 rounded-lg bg-amber-50">💾 儲存排序</button>
            </div>
            <div class="flex items-center gap-3">
                <span id="modeBadge" class="hidden text-xs bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded-full">隱密模式中</span>
                <button onclick="showModal('categoryModal')" class="text-xs border border-slate-300 px-3 py-1.5 rounded-lg text-slate-700 bg-white">分類</button>
            </div>
        </div>
    </nav>

    <div id="tabContainer" class="max-w-4xl mx-auto p-4 flex gap-6 border-b overflow-x-auto bg-white sticky top-[65px] z-40"></div>
    
    <main class="max-w-4xl mx-auto p-4 pb-28">
        <div id="bookContainer" class="space-y-2"></div>
    </main>

    <button onclick="openAddModal()" id="addBtn" class="fixed bottom-8 right-8 bg-emerald-700 text-white w-16 h-16 rounded-full shadow-2xl text-4xl z-40 flex items-center justify-center transition-transform hover:scale-105 active:scale-95">+</button>

    <!-- 分類管理 -->
    <div id="categoryModal" class="modal">
        <div class="bg-white rounded-2xl w-full max-w-md p-7 shadow-xl book-modal-content">
            <h3 class="text-xl font-bold mb-5 text-center text-slate-900 modal-text">分類設定 (<span id="catModalMode">正常</span>)</h3>
            <div id="categoryList" class="mb-5 space-y-2.5 max-h-60 overflow-y-auto"></div>
            <div class="bg-slate-100 p-4 rounded-xl space-y-3 book-modal-form">
                <input id="newCatName" type="text" placeholder="新分類名稱">
                <button onclick="addCategory()" class="w-full bg-emerald-700 text-white py-2.5 rounded-lg text-sm font-bold idBtn">新增分類</button>
            </div>
            <button onclick="closeModal('categoryModal')" class="w-full mt-5 text-slate-500 py-2 text-sm">關閉彈窗</button>
            <button onclick="resetAllData()" class="w-full mt-3 text-red-400 text-[11px] font-bold">⚠️ 強制清除手機快取(Reset)</button>
        </div>
    </div>

    <!-- 書籍詳細資料彈窗 -->
    <div id="detailModal" class="modal">
        <div class="bg-white rounded-2xl w-full max-w-md p-7 shadow-xl book-modal-content">
            <div class="flex justify-between items-start mb-4">
                <h3 id="detTitle" class="text-xl font-bold text-slate-900 modal-text">書名</h3>
                <span id="detRating" class="text-sm text-amber-500 font-bold">🌕 5.0</span>
            </div>
            <p id="detAuthor" class="text-xs text-slate-400 italic mb-4">作者</p>
            <div class="bg-slate-50 p-4 rounded-xl mb-4 book-modal-form max-h-60 overflow-y-auto">
                <p id="detDesc" class="text-sm text-slate-600 whitespace-pre-wrap leading-relaxed">暫無心得簡介內容。</p>
            </div>
            <div id="detLinkContainer" class="mb-6 hidden">
                <a id="detLink" href="#" target="_blank" class="text-sm text-sky-500 font-medium block truncate hover:underline">🔗 開啟設定網址</a>
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-slate-100 modal-footer">
                <div class="flex gap-2">
                    <button id="detEditBtn" class="text-xs bg-slate-100 text-slate-700 px-3 py-2 rounded-md font-bold">🛠️ 編輯</button>
                    <button id="detDelBtn" class="text-xs text-red-400 font-medium px-2 py-2">永久刪除</button>
                </div>
                <button onclick="closeModal('detailModal')" class="bg-slate-800 text-white px-5 py-2 rounded-md text-sm font-bold">關閉</button>
            </div>
        </div>
    </div>

    <!-- 新增/編輯書籍 -->
    <div id="bookModal" class="modal">
        <div class="bg-white rounded-2xl w-full max-w-md p-7 overflow-y-auto max-h-[95vh] shadow-xl book-modal-content">
            <h3 id="bookModalTitle" class="text-xl font-bold mb-6 text-slate-900 modal-text">新增書籍紀錄</h3>
            <input type="hidden" id="bookId">
            <div class="space-y-4 book-modal-form">
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">書名 (必填)</label><input id="bTitle" type="text" placeholder="輸入書名..."></div>
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">作者</label><input id="author" type="text" placeholder="作者名稱..."></div>
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">簡介 (心得)</label><textarea id="desc" placeholder="寫點閱讀心得或簡介..." class="h-28"></textarea></div>
                <div><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">網址</label><input id="link" type="text" placeholder="https://..."></div>
                <div class="flex gap-4">
                    <div class="w-1/2"><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">評分</label><input id="rating" type="number" step="0.5" min="0" max="10" value="5"></div>
                    <div class="w-1/2"><label class="text-[11px] text-slate-400 font-bold uppercase ml-1">分類</label><select id="bCat"></select></div>
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-6 mt-2 border-t border-slate-100 modal-footer">
                <button onclick="closeModal('bookModal')" class="px-5 py-2.5 text-slate-500 text-sm">取消</button>
                <button id="saveBtn" onclick="saveBook()" class="bg-emerald-700 text-white px-8 py-2.5 rounded-lg font-bold text-sm idBtn">儲存並同步雲端</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlN3KI7nsl5ZAqxWJFahZu-LkQTC78g85_fa8hU3_I6QhOx2uL-tes_Bu2eEb6Kdko/exec"; 
        const PRIVATE_PASS = "0416";

        // 分離本地快取鍵名，確保互不干擾
        let publicCats = JSON.parse(localStorage.getItem('pub_cats_v107')) || [{name:'未讀'},{name:'已讀'}];
        let secretCats = JSON.parse(localStorage.getItem('sec_cats_v107')) || [{name:'未讀'},{name:'已讀'}];
        let books = [];
        let hasOrderChanged = false;
        
        let isSecretMode = false;
        let activeTab = "";

        window.addEventListener('DOMContentLoaded', () => {
            if (publicCats.length > 0) activeTab = publicCats[0].name;
            renderUI();
            fetchAllData(false); // 初始載入正常模式（工作表1）
        });

        function triggerSecretMode() {
            if (hasOrderChanged && !confirm("您有變更排序尚未儲存，切換模式將遺失排序，確定切換嗎？")) return;
            hasOrderChanged = false;
            document.getElementById('saveOrderBtn').classList.add('hidden');

            if (!isSecretMode) {
                const password = prompt("此為隱密空間，請輸入安全密碼：");
                if (password === PRIVATE_PASS) {
                    isSecretMode = true;
                    activeTab = ""; 
                    enterSecretStyle();
                    fetchAllData(false); // 進入隱密模式，強制抓取工作表2
                } else if (password !== null) {
                    alert("❌ 密碼錯誤！存取被拒。");
                }
            } else {
                isSecretMode = false;
                activeTab = publicCats[0] ? publicCats[0].name : '';
                exitSecretStyle();
                fetchAllData(false); // 返回正常模式，強制抓取工作表1
            }
        }

        function autoMergeCategories() {
            // 過濾當前模式下的書籍
            const currentModeBooks = books.filter(b => b.isSecret === isSecretMode);
            const bookCats = [...new Set(currentModeBooks.map(b => b.category).filter(Boolean))];
            
            if (isSecretMode) {
                if(!secretCats.some(c => c.name === '未讀')) secretCats.push({name:'未讀'});
                if(!secretCats.some(c => c.name === '已讀')) secretCats.push({name:'已讀'});
                bookCats.forEach(name => {
                    if(!secretCats.some(c => c.name === name)) secretCats.push({name});
                });
                localStorage.setItem('sec_cats_v107', JSON.stringify(secretCats));
                if (!activeTab || !secretCats.some(c => c.name === activeTab)) {
                    activeTab = secretCats[0] ? secretCats[0].name : '';
                }
            } else {
                if(!publicCats.some(c => c.name === '未讀')) publicCats.push({name:'未讀'});
                if(!publicCats.some(c => c.name === '已讀')) publicCats.push({name:'已讀'});
                bookCats.forEach(name => {
                    if(!publicCats.some(c => c.name === name)) publicCats.push({name});
                });
                localStorage.setItem('pub_cats_v107', JSON.stringify(publicCats));
                if (!activeTab || !publicCats.some(c => c.name === activeTab)) {
                    activeTab = publicCats[0] ? publicCats[0].name : '';
                }
            }
        }

        function enterSecretStyle() {
            document.documentElement.classList.add('dark');
            document.getElementById('bodyBg').className = "bg-zinc-950 min-h-screen font-sans transition-colors duration-300 text-zinc-100";
            document.getElementById('navBg').className = "bg-zinc-900 shadow-xl sticky top-0 z-50 border-b border-zinc-800";
            document.getElementById('tabContainer').className = "max-w-4xl mx-auto p-4 flex gap-6 border-b border-zinc-800 overflow-x-auto bg-zinc-900 sticky top-[65px] z-40 text-zinc-400";
            document.getElementById('appTitle').innerText = "私人書庫"; 
            document.getElementById('appTitle').className = "text-xl font-bold text-rose-400";
            document.getElementById('syncBtn').className = "ml-2 text-xs text-rose-400 font-bold border border-rose-900 px-3 py-1 rounded-lg bg-zinc-900";
            document.getElementById('modeBadge').classList.remove('hidden');
            document.getElementById('addBtn').className = "fixed bottom-8 right-8 bg-rose-600 text-white w-16 h-16 rounded-full shadow-2xl text-4xl z-40 flex items-center justify-center transition-transform hover:scale-105 active:scale-95";
            document.getElementById('catModalMode').innerText = "隱密模式";

            document.querySelectorAll('.book-modal-content').forEach(m => m.classList.replace('bg-white', 'bg-zinc-900'));
            document.querySelectorAll('.modal-text').forEach(t => t.classList.replace('text-slate-900', 'text-zinc-100'));
            document.querySelectorAll('.book-modal-form').forEach(f => f.classList.replace('bg-slate-100', 'bg-zinc-800'));
            document.querySelectorAll('.modal-footer').forEach(f => f.classList.replace('border-slate-100', 'border-zinc-800'));
        }

        function exitSecretStyle() {
            document.documentElement.classList.remove('dark');
            document.getElementById('bodyBg').className = "bg-slate-50 min-h-screen font-sans transition-colors duration-300 text-slate-900";
            document.getElementById('navBg').className = "bg-white shadow-sm sticky top-0 z-50";
            document.getElementById('tabContainer').className = "max-w-4xl mx-auto p-4 flex gap-6 border-b overflow-x-auto bg-white sticky top-[65px] z-40 text-slate-600";
            document.getElementById('appTitle').innerText = "書庫紀錄";
            document.getElementById('appTitle').className = "text-xl font-bold text-slate-900";
            document.getElementById('syncBtn').className = "ml-2 text-sm text-emerald-700 font-bold border border-emerald-200 px-3 py-1.5 rounded-lg bg-emerald-50";
            document.getElementById('modeBadge').classList.add('hidden');
            document.getElementById('addBtn').className = "fixed bottom-8 right-8 bg-emerald-700 text-white w-16 h-16 rounded-full shadow-2xl text-4xl z-40 flex items-center justify-center transition-transform hover:scale-105 active:scale-95";
            document.getElementById('catModalMode').innerText = "正常模式";

            document.querySelectorAll('.book-modal-content').forEach(m => m.classList.replace('bg-zinc-900', 'bg-white'));
            document.querySelectorAll('.modal-text').forEach(t => t.classList.replace('text-zinc-100', 'text-slate-900'));
            document.querySelectorAll('.book-modal-form').forEach(f => f.classList.replace('bg-zinc-800', 'bg-slate-100'));
            document.querySelectorAll('.modal-footer').forEach(f => f.classList.replace('border-zinc-800', 'border-slate-100'));
        }

        function renderUI() {
            const currentCats = isSecretMode ? secretCats : publicCats;
            const tabBtnStyle = isSecretMode ? 'active-tab-secret' : 'active-tab';

            if (currentCats.length > 0 && (!activeTab || !currentCats.some(c => c.name === activeTab))) {
                activeTab = currentCats[0].name;
            }

            document.getElementById('tabContainer').innerHTML = currentCats.map(cat => `
                <button onclick="switchTab('${cat.name}')" class="pb-2.5 whitespace-nowrap text-sm ${activeTab === cat.name ? tabBtnStyle : 'text-slate-400 hover:text-slate-600'}">
                    ${cat.name}
                </button>
            `).join('');

            // 過濾出符合當前模式與分類的書
            const filteredBooks = books.filter(b => b.category === activeTab);
            
            const itemBg = isSecretMode ? 'bg-zinc-900 border-zinc-800 text-zinc-100 hover:bg-zinc-800' : 'bg-white border-slate-100 text-slate-800 hover:bg-slate-50';
            const textMuted = isSecretMode ? 'text-zinc-500' : 'text-slate-400';
            const moveBtnColor = isSecretMode ? 'text-zinc-500 hover:text-zinc-300' : 'text-slate-400 hover:text-slate-700';

            document.getElementById('bookContainer').innerHTML = filteredBooks.map((b, index) => {
                const globalIndex = books.findIndex(originalBook => originalBook.id === b.id);
                return `
                <div class="${itemBg} px-4 py-3 rounded-xl shadow-sm border flex items-center justify-between gap-3 transition-colors">
                    <div class="flex items-center gap-1">
                        <button onclick="moveBook(${globalIndex}, -1)" class="${moveBtnColor} font-mono p-1 text-xs active:scale-95 ${index === 0 ? 'opacity-20 pointer-events-none' : ''}">🔼</button>
                        <button onclick="moveBook(${globalIndex}, 1)" class="${moveBtnColor} font-mono p-1 text-xs active:scale-95 ${index === filteredBooks.length - 1 ? 'opacity-20 pointer-events-none' : ''}">🔽</button>
                    </div>
                    
                    <div onclick="openDetailModal('${b.id}')" class="flex-1 min-w-0 cursor-pointer py-1 flex items-center justify-between gap-4">
                        <div class="truncate">
                            <span class="font-bold text-sm md:text-base">${b.title}</span>
                            ${b.author ? `<span class="text-xs ${textMuted} ml-2 font-normal">(${b.author})</span>` : ''}
                        </div>
                        <span class="text-xs text-amber-500 font-bold whitespace-nowrap">🌕 ${parseFloat(b.rating).toFixed(1)}</span>
                    </div>
                </div>`;
            }).join('');

            if(filteredBooks.length === 0) {
                document.getElementById('bookContainer').innerHTML = `<div class="text-center py-12 ${textMuted} text-xs">此分類目前是空的。點右下角 + 新增書本</div>`;
            }

            document.querySelectorAll('.idBtn').forEach(btn => {
                if(isSecretMode) { btn.classList.replace('bg-emerald-700','bg-rose-600'); }
                else { btn.classList.replace('bg-rose-600','bg-emerald-700'); }
            });

            document.getElementById('bCat').innerHTML = currentCats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('categoryList').innerHTML = currentCats.map((c, i) => `
                <div class="flex justify-between items-center ${isSecretMode ? 'bg-zinc-800 border-zinc-700' : 'bg-slate-50 border-slate-100'} p-2.5 rounded-lg border mb-1.5">
                    <span class="text-sm">${c.name}</span>
                    <button onclick="deleteCat('${c.name}')" class="text-red-400 text-xs font-bold px-2 hover:text-red-500">刪除</button>
                </div>`).join('');
        }

        function moveBook(globalIndex, direction) {
            const targetIndex = globalIndex + direction;
            if (globalIndex < 0 || globalIndex >= books.length || targetIndex < 0 || targetIndex >= books.length) return;
            
            const temp = books[globalIndex];
            books[globalIndex] = books[targetIndex];
            books[targetIndex] = temp;
            
            hasOrderChanged = true;
            document.getElementById('saveOrderBtn').classList.remove('hidden');
            renderUI();
        }

        async function saveSortOrder() {
            const btn = document.getElementById('saveOrderBtn');
            const oldText = btn.innerText;
            btn.innerText = "⏳ 儲存中...";
            btn.disabled = true;

            try {
                await fetch(scriptURL, { 
                    method: "POST", 
                    mode: "no-cors", 
                    body: JSON.stringify({ 
                        action: "reorder", 
                        books: books, 
                        sheetName: isSecretMode ? "工作表2" : "工作表1" 
                    }) 
                });
                hasOrderChanged = false;
                btn.classList.add('hidden');
                alert("✨ 排序已成功儲存至雲端！");
                await fetchAllData(false);
            } catch (e) {
                alert("排序儲存失敗，請重試！");
            } finally {
                btn.innerText = oldText;
                btn.disabled = false;
            }
        }

        function openDetailModal(id) {
            const b = books.find(book => book.id === id);
            if(!b) return;

            document.getElementById('detTitle').innerText = b.title;
            document.getElementById('detAuthor').innerText = b.author ? `作者：${b.author}` : "未知作者";
            document.getElementById('detRating').innerText = `🌕 ${parseFloat(b.rating).toFixed(1)}`;
            document.getElementById('detDesc').innerText = b.desc || "無心得內容。";

            const linkContainer = document.getElementById('detLinkContainer');
            if(b.link) {
                linkContainer.classList.remove('hidden');
                document.getElementById('detLink').href = b.link;
            } else {
                linkContainer.classList.add('hidden');
            }

            document.getElementById('detEditBtn').onclick = () => { closeModal('detailModal'); openEditModal(id); };
            document.getElementById('detDelBtn').onclick = () => { closeModal('detailModal'); deleteBookCloud(id); };

            showModal('detailModal');
        }

        function switchTab(name) { 
            if (hasOrderChanged && !confirm("您有變更排序尚未儲存，切換分類將遺失排序，確定切換嗎？")) return;
            hasOrderChanged = false;
            document.getElementById('saveOrderBtn').classList.add('hidden');
            activeTab = name; 
            renderUI(); 
        }

        function openAddModal() {
            document.getElementById('bookId').value = "";
            document.getElementById('bookModalTitle').innerText = isSecretMode ? "新增安全書籍" : "新增書籍紀錄";
            document.getElementById('saveBtn').innerText = "儲存並新增至雲端";
            ['bTitle','author','desc','link'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('rating').value = "5";
            renderUI();
            showModal('bookModal');
        }

        function openEditModal(id) {
            const bookData = books.find(b => b.id === id);
            if(!bookData) return;
            document.getElementById('bookId').value = bookData.id;
            document.getElementById('bookModalTitle').innerText = "修改《" + bookData.title + "》";
            document.getElementById('saveBtn').innerText = "確認修改並更新雲端";
            document.getElementById('bTitle').value = bookData.title;
            document.getElementById('author').value = bookData.author || "";
            document.getElementById('desc').value = bookData.desc || "";
            document.getElementById('link').value = bookData.link || "";
            document.getElementById('rating').value = bookData.rating || "5";
            renderUI();
            document.getElementById('bCat').value = bookData.category; 
            showModal('bookModal');
        }

        async function saveBook() {
            if (hasOrderChanged && !confirm("您有變更排序尚未儲存，儲存書籍將會重置未儲存的排序，確定繼續嗎？")) return;
            hasOrderChanged = false;
            document.getElementById('saveOrderBtn').classList.add('hidden');

            const bookId = document.getElementById('bookId').value;
            const isEditing = bookId !== "";

            const book = {
                action: isEditing ? "edit" : "add",
                id: bookId,
                title: document.getElementById('bTitle').value.trim(),
                author: document.getElementById('author').value.trim(),
                desc: document.getElementById('desc').value.trim(),
                link: document.getElementById('link').value.trim(),
                rating: document.getElementById('rating').value || "5",
                category: document.getElementById('bCat').value,
                isSecret: isSecretMode,
                sheetName: isSecretMode ? "工作表2" : "工作表1" 
            };

            if (!book.title) return alert("書名是必填的喔！");
            
            const btn = document.getElementById('saveBtn');
            const oldText = btn.innerText;
            btn.innerText = "🚀 正在同步雲端更新中...";
            btn.disabled = true;

            try {
                await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(book) });
                closeModal('bookModal');
                await fetchAllData(false);
            } catch (e) { 
                alert("雲端同步失敗！"); 
            } finally { 
                btn.innerText = oldText; 
                btn.disabled = false; 
            }
        }

        async function deleteBookCloud(id) {
            if(!confirm("⚠️ 確定連同試算表永久刪除？")) return;
            try {
                await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify({
                    action: "delete", 
                    id: id, 
                    isSecret: isSecretMode, 
                    sheetName: isSecretMode ? "工作表2" : "工作表1"
                }) });
                await fetchAllData(false);
            } catch (e) { alert("雲端刪除失敗！"); }
        }

        async function fetchAllData(showError = true) {
            const btn = document.getElementById('syncBtn');
            if(btn) btn.innerText = "⚡ 同步中...";
            
            // 精準分流：私密模式強制傳 sheet=工作表2 ；非私密模式強制傳 sheet=工作表1
            const finalURL = isSecretMode 
                ? (scriptURL + "?pass=" + PRIVATE_PASS + "&sheet=工作表2") 
                : (scriptURL + "?sheet=工作表1");

            try {
                const response = await fetch(finalURL);
                const cloudData = await response.json();
                if (cloudData && Array.isArray(cloudData)) {
                    books = cloudData; 
                    autoMergeCategories(); 
                    renderUI();
                }
            } catch (e) { 
                if(showError) alert("同步失敗！"); 
            } finally {
                if(btn) btn.innerText = "🔄 同步";
            }
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            if(!name) return;
            const currentCats = isSecretMode ? secretCats : publicCats;
            if(!currentCats.some(c=>c.name===name)) {
                currentCats.push({name});
            }
            if(isSecretMode) localStorage.setItem('sec_cats_v107', JSON.stringify(secretCats));
            else localStorage.setItem('pub_cats_v107', JSON.stringify(publicCats));
            
            document.getElementById('newCatName').value = "";
            activeTab = name;
            renderUI();
        }

        function deleteCat(name) {
            if(!confirm("確定刪除此分類？")) return;
            if(isSecretMode) {
                secretCats = secretCats.filter(c => c.name !== name);
                localStorage.setItem('sec_cats_v107', JSON.stringify(secretCats));
                activeTab = secretCats[0] ? secretCats[0].name : '';
            } else {
                publicCats = publicCats.filter(c => c.name !== name);
                localStorage.setItem('pub_cats_v107', JSON.stringify(publicCats));
                activeTab = publicCats[0] ? publicCats[0].name : '';
            }
            renderUI();
        }

        function resetAllData() {
            if(confirm("這將清除手機所有暫存並重新載入雲端資料，確定嗎？")) {
                localStorage.clear();
                location.reload();
            }
        }

        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    </script>
</body>
</html>
