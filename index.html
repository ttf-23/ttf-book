<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>紀錄 / tantingfang 的書庫</title>
    
    <link rel="apple-touch-icon" href="https://img.onl/xT2gD"> 
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="書庫紀錄">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22%E7%B4%80%E9%8C%84%20/%20tantingfang%20%E7%9A%84%E6%9B%B8%E5%BA%AB%22,%22short_name%22:%22%E6%9B%B8%E5%BA%AB%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#6366f1%22,%22icons%22:[{%22src%22:%22https://img.onl/xT2gD%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal.show { display: flex; }
        .moon-text { color: #f59e0b; letter-spacing: 2px; }
        #addBookBtn, #manageCatsBtn { 
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.5);
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="text-xl font-bold text-slate-900">📖 書庫紀錄</h1>
            <button id="manageCatsBtn" onclick="showModal('categoryModal')" class="text-sm border border-slate-300 px-3 py-1 rounded-lg text-slate-700 bg-white">管理分類</button>
        </div>
    </nav>

    <div id="tabContainer" class="max-w-4xl mx-auto p-4 flex gap-6 border-b overflow-x-auto bg-white"></div>
    <main id="bookContainer" class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 pb-24"></main>

    <button id="addBookBtn" onclick="showModal('bookModal')" class="fixed bottom-8 right-8 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-xl text-3xl z-40 flex items-center justify-center">+</button>

    <div id="categoryModal" class="modal p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h3 class="text-lg font-bold mb-4 text-center border-b pb-2">管理分類</h3>
            <div id="categoryList" class="mb-4 space-y-2 overflow-y-auto max-h-60 p-1"></div>
            <div class="flex gap-2 bg-slate-100 p-2 rounded-xl">
                <input id="newCatName" type="text" placeholder="新分類名稱" class="flex-1 bg-transparent p-2 text-sm outline-none">
                <button onclick="addCategory()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">新增</button>
            </div>
            <button onclick="closeModal('categoryModal')" class="w-full mt-6 text-slate-500 py-2">關閉視窗</button>
            <button onclick="resetAllData()" class="w-full mt-4 text-red-400 text-[10px] text-center border-t pt-4">重置所有資料（若功能異常請點此）</button>
        </div>
    </div>

    <div id="bookModal" class="modal p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 overflow-y-auto max-h-[90vh]">
            <h3 class="text-lg font-bold mb-4">新增書籍</h3>
            <input id="bTitle" type="text" placeholder="書名" class="w-full border p-2 mb-2 rounded-lg">
            <input id="bAuthor" type="text" placeholder="作者" class="w-full border p-2 mb-2 rounded-lg text-sm">
            <textarea id="bDesc" placeholder="書籍簡介..." class="w-full border p-2 mb-2 rounded-lg h-24 text-sm"></textarea>
            <input id="bLink" type="text" placeholder="相關連結 (選填)" class="w-full border p-2 mb-2 rounded-lg text-sm">
            <div class="flex gap-2 mb-4">
                <div class="w-1/2">
                    <label class="text-[10px] text-slate-400 uppercase font-bold">評分 (0-10)</label>
                    <input id="bRating" type="number" step="0.5" min="0" max="10" value="5" class="w-full border p-2 rounded-lg">
                </div>
                <div class="w-1/2">
                    <label class="text-[10px] text-slate-400 uppercase font-bold">存放分類</label>
                    <select id="bCat" class="w-full border p-2 rounded-lg text-sm bg-white"></select>
                </div>
            </div>
            <div class="flex justify-end gap-2 pt-2">
                <button onclick="closeModal('bookModal')" class="px-4 py-2 text-slate-400 text-sm">取消</button>
                <button id="saveBtn" onclick="saveBook()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg">儲存書籍</button>
            </div>
        </div>
    </div>

    <script>
        // --- ⚠️ 記得在這裡補上你的網址 ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlN3KI7nsl5ZAqxWJFahZu-LkQTC78g85_fa8hU3_I6QhOx2uL-tes_Bu2eEb6Kdko/exec"; 

        const defaultCats = [
            { name: '未讀', private: false },
            { name: '已讀', private: false },
            { name: '私密', private: true }
        ];

        let categories = JSON.parse(localStorage.getItem('cats_v2')) || defaultCats;
        let books = JSON.parse(localStorage.getItem('books_v2')) || [];
        let activeTab = categories[0].name;

        function getMoonRating(score) {
            let moons = '';
            let fullMoons = Math.floor(score); 
            let hasHalf = (score % 1) >= 0.5;   
            if(fullMoons > 10) fullMoons = 10;
            for (let i = 0; i < fullMoons; i++) moons += '🌕';
            if (hasHalf && fullMoons < 10) moons += '🌗';
            return moons || '尚未評分';
        }

        async function saveBook() {
            const book = {
                title: document.getElementById('bTitle').value,
                author: document.getElementById('bAuthor').value,
                desc: document.getElementById('bDesc').value,
                link: document.getElementById('bLink').value,
                rating: document.getElementById('bRating').value,
                category: document.getElementById('bCat').value
            };
            if (!book.title) return alert("請輸入書名");
            const btn = document.getElementById('saveBtn');
            btn.innerText = "同步中...";
            btn.disabled = true;
            try {
                await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(book) });
                books.push(book);
                localStorage.setItem('books_v2', JSON.stringify(books));
                closeModal('bookModal');
                renderUI();
            } catch (e) {
                alert("同步失敗，請檢查網址");
            } finally {
                btn.innerText = "儲存書籍";
                btn.disabled = false;
            }
        }

        function renderUI() {
            // 更新 Tab
            document.getElementById('tabContainer').innerHTML = categories.map(cat => `
                <button onclick="switchTab('${cat.name}', ${cat.private})" class="pb-2 whitespace-nowrap transition-all ${activeTab === cat.name ? 'active-tab' : 'text-slate-400'}">
                    ${cat.private ? '🔒' : ''} ${cat.name}
                </button>
            `).join('');

            // 更新書籍列表
            const filteredBooks = books.filter(b => b.category === activeTab);
            document.getElementById('bookContainer').innerHTML = filteredBooks.length > 0 ? filteredBooks.map((b, i) => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 animate-in fade-in duration-500">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-slate-900">${b.title}</h4>
                        <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full">${b.rating} / 10</span>
                    </div>
                    <div class="moon-text text-sm mb-2">${getMoonRating(b.rating)}</div>
                    <p class="text-[11px] text-slate-400 italic">${b.author || '未知作者'}</p>
                    <p class="text-sm text-slate-600 mt-3 line-clamp-3 leading-relaxed">${b.desc || '無簡介'}</p>
                    ${b.link ? `<a href="${b.link}" target="_blank" class="text-xs text-indigo-500 mt-4 inline-block font-medium">查看連結 →</a>` : ''}
                </div>
            `).join('') : `<div class="col-span-full text-center py-20 text-slate-300 text-sm">目前此分類沒有書籍</div>`;

            // 更新管理清單中的分類 (核心修正區)
            document.getElementById('bCat').innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('categoryList').innerHTML = categories.map((c, i) => {
                const isDefault = defaultCats.some(dc => dc.name === c.name);
                return `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                    <span class="text-sm ${c.private ? 'text-indigo-600 font-bold' : 'text-slate-700'}">${c.private ? '🔒' : ''} ${c.name}</span>
                    ${isDefault ? 
                        '<span class="text-[10px] text-slate-300 px-2">系統</span>' : 
                        `<button onclick="deleteCat(${i})" class="text-red-500 text-xs font-bold bg-red-50 px-3 py-1 rounded-lg">刪除</button>`
                    }
                </div>`;
            }).join('');
        }

        function switchTab(name, isPrivate) {
            if (isPrivate) {
                const pw = prompt("請輸入密碼：");
                if (pw !== "0416") return alert("密碼錯誤");
            }
            activeTab = name;
            renderUI();
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            if (!name) return;
            if (categories.some(cat => cat.name === name)) return alert("此名稱已存在");
            categories.push({ name, private: false });
            localStorage.setItem('cats_v2', JSON.stringify(categories));
            document.getElementById('newCatName').value = '';
            renderUI();
        }

        // --- 核心修正：刪除函式 ---
        function deleteCat(index) {
            if(confirm(`確定要刪除「${categories[index].name}」分類嗎？\n(分類內的書籍不會消失，但會無法在此分類看到)`)) {
                const deletedName = categories[index].name;
                // 執行刪除
                categories.splice(index, 1);
                // 儲存新狀態
                localStorage.setItem('cats_v2', JSON.stringify(categories));
                // 如果刪除的是當前選中的，切換回第一個
                if(activeTab === deletedName) {
                    activeTab = categories[0].name;
                }
                renderUI();
            }
        }

        function resetAllData() {
            if(confirm('確定要「完全重置」嗎？這會清空所有設定過的分類與書籍資料！')) {
                localStorage.clear();
                location.reload();
            }
        }

        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        renderUI();
    </script>
</body>
</html>
```
