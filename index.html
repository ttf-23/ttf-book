<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端書庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal.show { display: flex; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="text-xl font-bold text-slate-800">📖 我的書管理</h1>
            <div class="flex gap-2">
                <button onclick="showModal('categoryModal')" class="text-sm border border-slate-300 px-3 py-1 rounded-lg text-slate-600">管理分類</button>
            </div>
        </div>
    </nav>

    <div id="tabContainer" class="max-w-4xl mx-auto p-4 flex gap-6 border-b overflow-x-auto bg-white"></div>
    <main id="bookContainer" class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4"></main>

    <button onclick="showModal('bookModal')" class="fixed bottom-8 right-8 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-lg text-3xl z-40">+</button>

    <div id="categoryModal" class="modal p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h3 class="text-lg font-bold mb-4">管理分類</h3>
            <div id="categoryList" class="mb-4 space-y-2"></div>
            <div class="flex gap-2">
                <input id="newCatName" type="text" placeholder="新分類名稱" class="flex-1 border p-2 rounded-lg">
                <label class="flex items-center text-sm"><input type="checkbox" id="newCatPrivacy" class="mr-1"> 加密</label>
                <button onclick="addCategory()" class="bg-slate-800 text-white px-4 py-2 rounded-lg">新增</button>
            </div>
            <button onclick="closeModal('categoryModal')" class="w-full mt-4 text-slate-400">關閉</button>
        </div>
    </div>

    <div id="bookModal" class="modal p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h3 class="text-lg font-bold mb-4">新增書籍</h3>
            <input id="bTitle" type="text" placeholder="書名" class="w-full border p-2 mb-2 rounded-lg">
            <input id="bAuthor" type="text" placeholder="作者" class="w-full border p-2 mb-2 rounded-lg">
            <textarea id="bDesc" placeholder="書籍簡介..." class="w-full border p-2 mb-2 rounded-lg h-24"></textarea>
            <input id="bLink" type="text" placeholder="相關連結" class="w-full border p-2 mb-2 rounded-lg">
            <div class="flex gap-2 mb-4">
                <select id="bRating" class="w-1/2 border p-2 rounded-lg">
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="1">⭐</option>
                </select>
                <select id="bCat" class="w-1/2 border p-2 rounded-lg"></select>
            </div>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('bookModal')" class="px-4 py-2 text-slate-400">取消</button>
                <button id="saveBtn" onclick="saveBook()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">儲存書籍</button>
            </div>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        // ⚠️ 這裡！！請把你在 Apps Script 拿到的網址貼在下面兩個引號中間
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlN3KI7nsl5ZAqxWJFahZu-LkQTC78g85_fa8hU3_I6QhOx2uL-tes_Bu2eEb6Kdko/exec"; 

        let categories = JSON.parse(localStorage.getItem('cats')) || [
            { name: '未讀', private: false },
            { name: '已讀', private: false }
        ];
        let books = JSON.parse(localStorage.getItem('books')) || [];
        let activeTab = categories[0].name;

        // --- 儲存到 Google 試算表 ---
        async function saveBook() {
            const book = {
                title: document.getElementById('bTitle').value,
                author: document.getElementById('bAuthor').value,
                desc: document.getElementById('bDesc').value,
                link: document.getElementById('bLink').value,
                rating: document.getElementById('bRating').value,
                category: document.getElementById('bCat').value
            };

            if (!book.title) return alert("請輸入書名");

            const btn = document.getElementById('saveBtn');
            btn.innerText = "同步中...";
            btn.disabled = true;

            try {
                // 發送到 Google
                await fetch(scriptURL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(book)
                });

                books.push(book);
                localStorage.setItem('books', JSON.stringify(books));
                alert("儲存成功！資料已同步到雲端");
                closeModal('bookModal');
                renderUI();
            } catch (e) {
                alert("同步失敗，請檢查網路或網址設定");
            } finally {
                btn.innerText = "儲存書籍";
                btn.disabled = false;
            }
        }

        // --- 其他介面邏輯 (維持不變) ---
        function renderUI() {
            document.getElementById('tabContainer').innerHTML = categories.map(cat => `
                <button onclick="switchTab('${cat.name}', ${cat.private})" class="pb-2 whitespace-nowrap ${activeTab === cat.name ? 'active-tab' : 'text-slate-400'}">
                    ${cat.private ? '🔒' : ''} ${cat.name}
                </button>
            `).join('');

            document.getElementById('bookContainer').innerHTML = books.filter(b => b.category === activeTab).map((b, i) => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-slate-800">${b.title}</h4>
                        <span class="text-xs bg-amber-50 text-amber-600 px-2 py-1 rounded">${'⭐'.repeat(b.rating)}</span>
                    </div>
                    <p class="text-xs text-slate-400">${b.author}</p>
                    <p class="text-sm text-slate-600 mt-2">${b.desc}</p>
                </div>
            `).join('');

            document.getElementById('bCat').innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('categoryList').innerHTML = categories.map((c, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded">
                    <span>${c.private ? '🔒' : '📁'} ${c.name}</span>
                    <button onclick="deleteCat(${i})" class="text-red-400 text-xs">刪除</button>
                </div>
            `).join('');
        }

        function switchTab(name, isPrivate) {
            if (isPrivate) {
                const pw = prompt("請輸入密碼：");
                if (pw !== "0416") return alert("密碼錯誤");
            }
            activeTab = name;
            renderUI();
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value;
            if (!name) return;
            categories.push({ name, private: document.getElementById('newCatPrivacy').checked });
            localStorage.setItem('cats', JSON.stringify(categories));
            renderUI();
        }

        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        renderUI();
    </script>
</body>
</html>
