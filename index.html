<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>紀錄 / tantingfang 的書庫</title>
    
    <link rel="apple-touch-icon" href="https://img.onl/xT2gD"> 
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal.show { display: flex; }
        /* tan 隱藏開關：非常淡，不影響美觀 */
        #tanBtn { cursor: pointer; user-select: none; opacity: 0.2; }
        .book-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold text-slate-900">📖 書庫紀錄</h1>
                <span id="tanBtn" onclick="toggleSecretMode()" class="text-[10px] text-slate-400 font-mono italic">tan</span>
            </div>
            <button onclick="showModal('categoryModal')" class="text-sm border border-slate-300 px-3 py-1 rounded-lg text-slate-700 bg-white">管理分類</button>
        </div>
    </nav>

    <div id="tabContainer" class="max-w-4xl mx-auto p-4 flex gap-6 border-b overflow-x-auto bg-white"></div>
    
    <main id="bookContainer" class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 pb-24"></main>

    <button onclick="showModal('bookModal')" class="fixed bottom-8 right-8 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-xl text-3xl z-40 flex items-center justify-center">+</button>

    <div id="categoryModal" class="modal p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h3 class="text-lg font-bold mb-4 text-center">分類設定</h3>
            <div id="categoryList" class="mb-4 space-y-2 max-h-60 overflow-y-auto"></div>
            <div class="bg-slate-100 p-3 rounded-xl space-y-2 border border-slate-200">
                <input id="newCatName" type="text" placeholder="輸入新分類名稱" class="w-full p-2 rounded-lg text-sm border outline-none">
                <label class="flex items-center text-xs text-slate-500 cursor-pointer">
                    <input type="checkbox" id="isPrivate" class="mr-1"> 將此分類加密 (需點擊 tan 才能看到)
                </label>
                <button onclick="addCategory()" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold shadow-sm">新增分類</button>
            </div>
            <button onclick="closeModal('categoryModal')" class="w-full mt-4 text-slate-400 py-2">關閉視窗</button>
            <button onclick="resetAllData()" class="w-full mt-2 text-red-300 text-[10px]">重置所有手機紀錄</button>
        </div>
    </div>

    <div id="bookModal" class="modal p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 overflow-y-auto max-h-[90vh]">
            <h3 class="text-lg font-bold mb-4">新增書籍</h3>
            <input id="bTitle" type="text" placeholder="書名" class="w-full border p-2 mb-2 rounded-lg">
            <input id="bAuthor" type="text" placeholder="作者" class="w-full border p-2 mb-2 rounded-lg text-sm">
            <textarea id="bDesc" placeholder="寫點閱讀心得..." class="w-full border p-2 mb-2 rounded-lg h-24 text-sm"></textarea>
            <input id="bLink" type="text" placeholder="相關網址" class="w-full border p-2 mb-2 rounded-lg text-sm">
            <div class="flex gap-2 mb-4">
                <div class="w-1/2">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Rating</label>
                    <input id="bRating" type="number" step="0.5" min="0" max="10" value="5" class="w-full border p-2 rounded-lg">
                </div>
                <div class="w-1/2">
                    <label class="text-[10px] text-slate-400 font-bold uppercase">Category</label>
                    <select id="bCat" class="w-full border p-2 rounded-lg text-sm bg-white"></select>
                </div>
            </div>
            <div class="flex justify-end gap-2 pt-2">
                <button onclick="closeModal('bookModal')" class="px-4 py-2 text-slate-400 text-sm">取消</button>
                <button id="saveBtn" onclick="saveBook()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbzlN3KI7nsl5ZAqxWJFahZu-LkQTC78g85_fa8hU3_I6QhOx2uL-tes_Bu2eEb6Kdko/exec"; 
        const defaultCats = [{name:'未讀',private:false},{name:'已讀',private:false}];
        
        // --- 變數初始化 ---
        let categories = JSON.parse(localStorage.getItem('cats_v2')) || defaultCats;
        let books = JSON.parse(localStorage.getItem('books_v2')) || [];
        let isSecretMode = false;
        let activeTab = categories[0].name;

        // --- 功能模組 ---

        // 隱藏入口開關
        function toggleSecretMode() {
            isSecretMode = !isSecretMode;
            const available = categories.filter(c => c.private === isSecretMode);
            if (available.length > 0) activeTab = available[0].name;
            renderUI();
        }

        // 渲染畫面
        function renderUI() {
            // 標籤列
            const visibleCats = categories.filter(cat => cat.private === isSecretMode);
            document.getElementById('tabContainer').innerHTML = visibleCats.map(cat => `
                <button onclick="switchTab('${cat.name}', ${cat.private})" class="pb-2 whitespace-nowrap transition-all ${activeTab === cat.name ? 'active-tab' : 'text-slate-400'}">
                    ${cat.private ? '🔒' : ''} ${cat.name}
                </button>
            `).join('');

            // 書籍清單
            const filteredBooks = books.filter(b => b.category === activeTab);
            document.getElementById('bookContainer').innerHTML = filteredBooks.map((b, idx) => {
                const realIndex = books.indexOf(b);
                return `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 book-card">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-900">${b.title}</h4>
                            <p class="text-[10px] text-slate-400 italic">${b.author || '未知作者'}</p>
                        </div>
                        <div class="flex flex-col gap-1 ml-2">
                            <button onclick="moveBook(${realIndex}, -1)" class="text-[10px] bg-slate-100 p-1 rounded hover:bg-slate-200">⬆️</button>
                            <button onclick="moveBook(${realIndex}, 1)" class="text-[10px] bg-slate-100 p-1 rounded hover:bg-slate-200">⬇️</button>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 line-clamp-2 mt-2">${b.desc || '暫無心得紀錄...'}</p>
                    <div class="flex justify-between items-center mt-5">
                        <span class="text-xs text-amber-500 font-bold bg-amber-50 px-2 py-1 rounded-full">🌕 ${b.rating} / 10</span>
                        <div class="flex gap-3">
                            <button onclick="changeCategory(${realIndex})" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-md font-bold hover:bg-indigo-100 transition-colors">📦 移動</button>
                            <button onclick="deleteBook(${realIndex})" class="text-[10px] text-red-300 hover:text-red-500">刪除</button>
                        </div>
                    </div>
                </div>`;
            }).join('') || `<div class="col-span-full text-center py-20 text-slate-300 text-sm italic">此分類目前空空如也</div>`;

            // 下拉選單與分類列表
            document.getElementById('bCat').innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('categoryList').innerHTML = categories.map((c, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                    <span class="text-sm text-slate-700">${c.private ? '🔒' : ''} ${c.name}</span>
                    <button onclick="deleteCat(${i})" class="text-red-400 text-xs px-2 font-bold">刪除</button>
                </div>`).join('');
        }

        // 手動排序
        function moveBook(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= books.length) return;
            // 僅在同分類內交換位置 (避免跨分類排序導致邏輯混亂)
            const target = books[index];
            books.splice(index, 1);
            books.splice(newIndex, 0, target);
            syncStorage();
        }

        // 快速更換分類
        function changeCategory(index) {
            const catNames = categories.map(c => c.name);
            const newCat = prompt("要搬移到哪個分類？\n可用選項：" + catNames.join('、'));
            if (newCat && catNames.includes(newCat)) {
                books[index].category = newCat;
                syncStorage();
            } else if (newCat) { alert("找不到該分類，請確認名稱是否正確！"); }
        }

        // 儲存書籍
        async function saveBook() {
            const book = {
                title: document.getElementById('bTitle').value.trim(),
                author: document.getElementById('bAuthor').value.trim(),
                desc: document.getElementById('bDesc').value.trim(),
                link: document.getElementById('bLink').value.trim(),
                rating: document.getElementById('bRating').value,
                category: document.getElementById('bCat').value
            };
            if (!book.title) return alert("請輸入書名！");
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "同步雲端中...";
            btn.disabled = true;

            try {
                // 發送到 Google 試算表
                await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(book) });
                books.push(book);
                syncStorage();
                closeModal('bookModal');
                // 清空表單
                ['bTitle','bAuthor','bDesc','bLink'].forEach(id => document.getElementById(id).value = "");
            } catch (e) { alert("同步失敗，請檢查網路！"); }
            finally {
                btn.innerText = "確認儲存";
                btn.disabled = false;
            }
        }

        // 基礎功能
        function deleteBook(i) { if(confirm("確定要刪除這本書的紀錄嗎？")) { books.splice(i, 1); syncStorage(); } }
        function syncStorage() { localStorage.setItem('books_v2', JSON.stringify(books)); renderUI(); }
        function switchTab(name, isPriv) {
            if (isPriv && prompt("此為私密區域，請輸入密碼：") !== "0416") return alert("密碼錯誤！");
            activeTab = name; renderUI();
        }
        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            if(!name) return;
            if(categories.some(c => c.name === name)) return alert("分類名稱重複！");
            categories.push({ name, private: document.getElementById('isPrivate').checked });
            localStorage.setItem('cats_v2', JSON.stringify(categories));
            document.getElementById('newCatName').value = "";
            document.getElementById('isPrivate').checked = false;
            renderUI();
        }
        function deleteCat(i) { if(confirm("刪除分類不會刪除書籍，但書籍會留在原本的分類標記。確定刪除？")) { categories.splice(i, 1); localStorage.setItem('cats_v2', JSON.stringify(categories)); renderUI(); } }
        function resetAllData() { if(confirm("這將清空此手機上的所有快取資料（包含書籍與分類），確定嗎？")) { localStorage.clear(); location.reload(); } }
        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        // 啟動渲染
        renderUI();
    </script>
</body>
</html>
